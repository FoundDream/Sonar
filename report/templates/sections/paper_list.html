{% if paper_list %}
<div class="section">
    <h2>延伸阅读</h2>
    <p class="section-desc">报告中引用的全部学习资料汇总</p>

    {% for item in paper_list %}
    {% if item.url and item.title %}
    <div class="resource-item" style="margin-bottom: 0.6rem;">
        <a href="{{ item.url }}" target="_blank">{{ item.title }}</a>
        {% if item.description %}<span class="desc">— {{ item.description }}</span>{% endif %}
        {% if item.from_concept %}<span class="desc" style="opacity:0.5;">（{{ item.from_concept }}）</span>{% endif %}
    </div>
    {% endif %}
    {% endfor %}
</div>
{% endif %}
